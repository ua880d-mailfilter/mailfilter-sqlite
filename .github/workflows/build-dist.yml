name: Build source tarball

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-dist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            build-essential \
            flex \
            bison \
            pkg-config \
            libsqlite3-dev \
            libssl-dev

      - name: Show tool versions (debug)
        run: |
          gcc --version
          g++ --version
          autoconf --version
          automake --version
          flex --version
          bison --version

      - name: Generate configure (autoreconf)
        working-directory: mailfilter-sqlite-2.0.1
        run: autoreconf -fi

      - name: Configure (with SQLite support)
        working-directory: mailfilter-sqlite-2.0.1
        run: ./configure --enable-sqlite3-headerlog

      - name: Build
        working-directory: mailfilter-sqlite-2.0.1
        run: make -j"$(nproc)"

      - name: Create dist tarball
        working-directory: mailfilter-sqlite-2.0.1
        run: make dist

      - name: List artifacts (debug)
        run: ls -lh *.tar.gz

      - name: Upload tarball as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mailfilter-sqlite-dist
          path: mailfilter-sqlite-2.0.1/*.tar.gz
