name: Build and release source packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            build-essential \
            flex \
            bison \
            libfl-dev \
            pkg-config \
            libsqlite3-dev \
            libssl-dev

      - name: Show tool versions
        run: |
          gcc --version
          g++ --version
          autoconf --version
          automake --version
          flex --version
          bison --version

      - name: Generate configure
        working-directory: mailfilter-sqlite-2.0.1
        run: autoreconf -fi

      - name: Configure
        working-directory: mailfilter-sqlite-2.0.1
        run: ./configure --enable-sqlite3-headerlog

      - name: Build
        working-directory: mailfilter-sqlite-2.0.1
        run: make -j"$(nproc)"

      - name: Build core dist tarball
        working-directory: mailfilter-sqlite-2.0.1
        run: make dist

      - name: Build full project tarball
        run: |
          FULLDIR="mailfilter-sqlite-full-${GITHUB_REF_NAME#v}"
          rm -rf "$FULLDIR"
          mkdir -p "$FULLDIR"

          cp -a \
            README.md \
            QUICKSTART.md \
            QUICKSTART_DE.md \
            INSTALL.md \
            ARCHITECTURE.md \
            CONFIGURATION.md \
            CONFIGURATION_DE.md \
            RULEGEN.md \
            RULEGEN_DE.md \
            EXAMPLES.md \
            EXAMPLES_DE.md \
            DESIGN.md \
            DESIGN_DE.md \
            USECASES.md \
            USECASES_DE.md \
            SQLITE_INTEGRATION.md \
            SQLITE_INTEGRATION_DE.md \
            "$FULLDIR/" || true

          [ -d docs ] && cp -a docs "$FULLDIR/"
          [ -d rulegen ] && cp -a rulegen "$FULLDIR/"
          [ -d config ] && cp -a config "$FULLDIR/"
          [ -d testdata ] && cp -a testdata "$FULLDIR/"
          [ -d output-examples ] && cp -a output-examples "$FULLDIR/"

          cp -a mailfilter-sqlite-2.0.1 "$FULLDIR/"

          tar czf "${FULLDIR}.tar.gz" "$FULLDIR"

      - name: Find generated tarballs
        run: find . -maxdepth 2 -name "*.tar.gz" -type f -ls

      - name: Upload core tarball as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mailfilter-sqlite-core-dist
          path: mailfilter-sqlite-2.0.1/*.tar.gz

      - name: Upload full tarball as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mailfilter-sqlite-full-dist
          path: mailfilter-sqlite-full-*.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mailfilter-sqlite-2.0.1/*.tar.gz
            mailfilter-sqlite-full-*.tar.gz
